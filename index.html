<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/png" href="favicon.png" />

        <title>Lince Rojo Estudio</title>

        <style>
            :root {
                --bg-color: #121212;
                --card-color: #1e1e1e;
                --text-color: #ffffff;
                --accent-color: #d94841;
                --hover-color: #f05a52;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                background: linear-gradient(135deg, #121212, #1a1a1a);
                color: var(--text-color);
                font-family: Arial, Helvetica, sans-serif;
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 2rem;
            }

            .container {
                width: 100%;
                max-width: 500px;
                text-align: center;
            }

            .logo {
                width: 140px;
                height: 140px;
                margin: 0 auto 1.5rem auto;
                border: 2px dashed rgba(255,255,255,0.3);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                color: rgba(255,255,255,0.5);
                font-size: 0.9rem;
                overflow: hidden;
            }

            .logo img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            h1 {
                margin-bottom: 0.5rem;
                font-size: 2rem;
            }

            p {
                color: #cccccc;
                margin-bottom: 2rem;
            }

            .links {
                display: flex;
                flex-direction: column;
                gap: 1rem;
            }

            .link-button {
                display: block;
                padding: 1rem;
                text-decoration: none;
                color: white;
                background-color: var(--card-color);
                border: 2px solid transparent;
                border-radius: 12px;
                transition: all 0.25s ease;
                font-weight: bold;
            }

            .link-button:hover {
                background-color: var(--accent-color);
                border-color: var(--hover-color);
                transform: translateY(-2px);
            }

            .footer {
                margin-top: 2rem;
                color: #888;
                font-size: 0.85rem;
            }

            p a {
                color: var(--accent-color);
                text-decoration: none;
                font-weight: bold;
                transition: color 0.25s ease;
            }

            p a:hover {
                color: var(--hover-color);
                text-decoration: underline;
            }
        </style>
    </head>
    <body>

    <div class="container">

        <div class="logo">
            <img src="./logo-lince-rojo_sin-texto_recortado.png" alt="Lince Rojo Estudio Logo">
        </div>

        <h1>Lince Rojo Estudio</h1>

        <p>
            Academia de dibujo, pintura e ilustración. Contacto: <a href="mailto:lincerojoestudio@gmail.com">lincerojoestudio@gmail.com</a>
        </p>

        <div class="links">

            <a
                class="link-button"
                href="https://www.instagram.com/lincerojoestudio/"
                target="_blank"
                rel="noopener noreferrer">
                📸 Instagram de la academia
            </a>

            <a
                class="link-button"
                href="https://docs.google.com/forms/d/e/1FAIpQLSdwYTiTxJRE6hhbuBXtoig5iWMnfjx4yUbOtSB_veCXmO0Cmg/viewform"
                target="_blank"
                rel="noopener noreferrer">
                🎨 Inscripción Academia
            </a>

        </div>

        <div style="margin-top: 1rem; margin-bottom: 0.25rem; color: #cccccc; font-size: 0.95rem; font-weight: bold;">
    👩‍🎨 Instagram de los profesores
    </div>

    <a
        class="link-button"
        href="https://www.instagram.com/ilustracriz/"
        target="_blank"
        rel="noopener noreferrer">
        📸 @ilustracriz
    </a>

    <a
        class="link-button"
        href="https://www.instagram.com/rojo_d_art/"
        target="_blank"
        rel="noopener noreferrer">
        📸 @rojo_d_art
    </a>

        <div class="footer">
            © Lince Rojo Estudio
        </div>

    </div>

    </body>
</html>
